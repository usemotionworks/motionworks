name: Keep Render Backend Awake

on:
  schedule:
    # Runs every 14 minutes, from 08:00 to 23:59 UTC daily
    # Note: GitHub Actions uses UTC time. Adjust the hours if you are in a different timezone!
    - cron: '*/14 8-23 * * *'
  
  # Allows you to manually trigger the workflow from the Actions tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Instances
        run: |
          # Iteration 1
          curl -sL https://api.usemotionworks.com/health || echo "Ping failed for instance 1"
          
          # Iteration 2 (Optional - remove if pushing past 750 total hours)
          # curl -sL https://api.usemotionworks.com/health || echo "Ping failed for instance 2"


